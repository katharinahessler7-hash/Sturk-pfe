<script>
const board = document.getElementById("board");
const scoreDisplay = document.getElementById("score");
const livesDisplay = document.getElementById("lives");

let score = 0;
let lives = 3;
let speed = 1200;
let gameOver = false;

const faces = ["😀","😎","😆","😜","🤓","😇","🥳"];
const layout = [4,3,2,1];
const holes = [];

// 🔥 GAME OVER SCREEN erstellen
const gameOverScreen = document.createElement("div");
gameOverScreen.style = `
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
z-index:1000;
`;

gameOverScreen.innerHTML = `
<div id="finalScore"></div>
<button onclick="restartGame()" style="margin-top:20px; font-size:20px;">
Restart
</button>
`;

document.body.appendChild(gameOverScreen);

// 🧩 Board erstellen
layout.forEach(count => {
  const row = document.createElement("div");
  row.classList.add("row");

  for (let i=0;i<count;i++){
    const hole = document.createElement("div");
    hole.classList.add("hole");
    hole.dataset.state = "empty";

    const person = document.createElement("div");
    person.classList.add("person");
    const face = document.createElement("span");
    person.appendChild(face);

    const bomb = document.createElement("div");
    bomb.classList.add("bomb");
    bomb.innerHTML = "<span>💣</span>";

    hole.appendChild(person);
    hole.appendChild(bomb);
    row.appendChild(hole);

    holes.push({hole, face});

    hole.addEventListener("click", ()=>{

      if (gameOver) return;

      const state = hole.dataset.state;

      // 💣 Bombe
      if (state === "bomb"){
        lives--;
        updateLives();
        clearHole(hole);

        if (lives <= 0){
          endGame();
        }
        return;
      }

      // 😀 Treffer
      if (state === "person"){
        score++;
        updateScore();
        clearHole(hole);
      }
    });
  }

  board.appendChild(row);
});

function clearHole(hole){
  hole.dataset.state = "empty";
  hole.classList.remove("active");
  hole.classList.remove("bomb-active");
}

function updateScore(){
  scoreDisplay.textContent = "Score: " + score;
}

function updateLives(){
  livesDisplay.textContent = "❤️".repeat(lives);
}

function randomHole(){
  return holes[Math.floor(Math.random()*holes.length)];
}

function spawn(){
  const obj = randomHole();
  const hole = obj.hole;

  // ❗ WICHTIG: nicht überschreiben
  if (hole.dataset.state !== "empty") return;

  let bombChance = Math.min(0.1 + score * 0.02, 0.5);
  const isBomb = Math.random() < bombChance;

  if (isBomb){
    hole.dataset.state = "bomb";
    hole.classList.add("bomb-active");
  } else {
    hole.dataset.state = "person";
    obj.face.textContent = faces[Math.floor(Math.random()*faces.length)];
    hole.classList.add("active");
  }

  setTimeout(()=>{
    if (hole.dataset.state !== "empty"){
      clearHole(hole);
    }
  }, speed * 0.8);
}

function gameLoop(){
  if (gameOver) return;

  spawn();

  if (score > 8) spawn();
  if (score > 15) spawn();

  speed = Math.max(400, 1200 - score * 25);

  setTimeout(gameLoop, speed);
}

function endGame(){
  gameOver = true;
  gameOverScreen.style.display = "flex";
  document.getElementById("finalScore").textContent = "Game Over! Score: " + score;
}

function restartGame(){
  score = 0;
  lives = 3;
  speed = 1200;
  gameOver = false;

  updateScore();
  updateLives();

  holes.forEach(obj => clearHole(obj.hole));

  gameOverScreen.style.display = "none";

  gameLoop();
}

updateLives();
gameLoop();
</script>
